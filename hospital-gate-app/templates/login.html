<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Gate Entry - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0b3b5c 0%, #1a6b8a 50%, #0b3b5c 100%); overflow: hidden; }
        body::before { content: ''; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle at 30% 40%, rgba(255,255,255,0.03) 0%, transparent 60%); pointer-events: none; }
        .login-container { background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); border-radius: 24px; padding: 48px 40px; width: 420px; box-shadow: 0 25px 60px rgba(0,0,0,0.3); position: relative; }
        .login-container::before { content: ''; position: absolute; inset: -2px; border-radius: 26px; background: linear-gradient(135deg, #00d4ff, #0072ff, #00d4ff); z-index: -1; opacity: 0.5; }
        .hospital-icon { width: 72px; height: 72px; background: linear-gradient(135deg, #0072ff, #00d4ff); border-radius: 18px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 36px; color: white; box-shadow: 0 8px 24px rgba(0,114,255,0.3); }
        h1 { text-align: center; font-size: 22px; color: #1a1a2e; margin-bottom: 4px; }
        .subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 32px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #333; margin-bottom: 6px; }
        input[type="text"], input[type="password"] { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 15px; transition: all 0.2s; background: #f8f9fa; }
        input:focus { border-color: #0072ff; outline: none; background: white; box-shadow: 0 0 0 4px rgba(0,114,255,0.1); }
        .login-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #0072ff, #00d4ff); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 15px rgba(0,114,255,0.3); }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,114,255,0.4); }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .error-msg { color: #dc3545; font-size: 13px; text-align: center; margin-top: 12px; display: none; }
        .demo-info { margin-top: 24px; padding: 16px; background: #f0f7ff; border-radius: 12px; font-size: 13px; color: #555; }
        .demo-info strong { color: #0072ff; }
        .demo-info code { background: #e0edff; padding: 2px 8px; border-radius: 4px; font-family: monospace; }
        .demo-info div { margin: 4px 0; }
        .spinner { display: none; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-text { display: inline; }
        .loading .btn-text { display: none; }
        .loading .spinner { display: block; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="hospital-icon">+H</div>
        <h1>Gate Entry Management</h1>
        <p class="subtitle">Hospital Security Access System</p>
        <form id="loginForm" onsubmit="return handleLogin(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username" required autocomplete="off">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="login-btn" id="loginBtn">
                <span class="btn-text">Sign In</span>
                <div class="spinner"></div>
            </button>
            <div class="error-msg" id="errorMsg"></div>
        </form>
        <div class="demo-info">
            <strong>Demo Credentials</strong>
            <div>Admin: <code>admin</code> / <code>admin123</code></div>
            <div>Guard: <code>guard1</code> / <code>guard123</code></div>
        </div>
    </div>
    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            btn.classList.add('loading');
            btn.disabled = true;
            errorMsg.style.display = 'none';
            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if (data.success) {
                    window.location.href = '/dashboard';
                } else {
                    errorMsg.textContent = data.error || 'Login failed';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Connection error';
                errorMsg.style.display = 'block';
            }
            btn.classList.remove('loading');
            btn.disabled = false;
        }
    </script>
</body>
</html>
