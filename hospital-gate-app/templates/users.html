<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - Hospital Gate</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header"><div class="logo">+H</div><span class="logo-text">Gate Entry</span></div>
        <nav class="sidebar-nav">
            <a href="/dashboard" class="nav-item"><span class="nav-icon">&#9679;</span> Dashboard</a>
            <a href="/gates" class="nav-item"><span class="nav-icon">&#9776;</span> Gate Control</a>
            <a href="/entry" class="nav-item"><span class="nav-icon">&#9654;</span> Entry/Exit</a>
            <a href="/visitors" class="nav-item"><span class="nav-icon">&#9787;</span> Visitors</a>
            <a href="/reports" class="nav-item"><span class="nav-icon">&#128202;</span> Reports</a>
            <a href="/alerts" class="nav-item"><span class="nav-icon">&#9888;</span> Alerts <span class="badge" id="alertBadge">0</span></a>
            <hr class="nav-divider">
            <a href="/settings" class="nav-item"><span class="nav-icon">&#9881;</span> Settings</a>
            <a href="/logout" class="nav-item"><span class="nav-icon">&#8617;</span> Logout</a>
        </nav>
        <div class="sidebar-footer"><div id="userInfo">Loading...</div></div>
    </aside>
    <main class="main-content">
        <header class="topbar">
            <h1>User Management</h1>
            <div class="topbar-right">
                <button class="btn btn-primary" onclick="showAddUser()">+ Add User</button>
            </div>
        </header>

        <div class="card">
            <div class="card-header"><h3>System Users</h3></div>
            <div class="card-body">
                <table class="data-table">
                    <thead><tr><th>Username</th><th>Full Name</th><th>Role</th><th>Phone</th><th>Email</th><th>Active</th></tr></thead>
                    <tbody id="userTableBody"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div class="modal" id="addUserModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add New User</h3>
                <button class="modal-close" onclick="closeModal('addUserModal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="userForm" onsubmit="return addUser(event)">
                    <div class="form-group"><label>Username</label><input type="text" id="uUsername" class="form-input" required></div>
                    <div class="form-group"><label>Full Name</label><input type="text" id="uFullName" class="form-input" required></div>
                    <div class="form-group"><label>Password</label><input type="password" id="uPassword" class="form-input" required></div>
                    <div class="form-group"><label>Role</label>
                        <select id="uRole" class="form-input">
                            <option value="guard">Security Guard</option>
                            <option value="admin">Administrator</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Phone</label><input type="text" id="uPhone" class="form-input"></div>
                    <div class="form-group"><label>Email</label><input type="email" id="uEmail" class="form-input"></div>
                    <button type="submit" class="btn btn-primary btn-block">Create User</button>
                </form>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script>
        async function loadUsers() {
            const res = await fetch('/api/users');
            const users = await res.json();
            document.getElementById('userTableBody').innerHTML = users.map(u => `<tr>
                <td>${u.username}</td>
                <td>${u.full_name}</td>
                <td><span class="badge-sm ${u.role === 'admin' ? 'status-approved' : 'status-pending'}">${u.role}</span></td>
                <td>${u.phone || '-'}</td>
                <td>${u.email || '-'}</td>
                <td>${u.is_active ? '&#10003;' : '&#10007;'}</td>
            </tr>`).join('');
        }

        function showAddUser() {
            document.getElementById('addUserModal').classList.add('show');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('show');
        }

        async function addUser(e) {
            e.preventDefault();
            const data = {
                username: document.getElementById('uUsername').value,
                full_name: document.getElementById('uFullName').value,
                password: document.getElementById('uPassword').value,
                role: document.getElementById('uRole').value,
                phone: document.getElementById('uPhone').value,
                email: document.getElementById('uEmail').value
            };
            await fetch('/api/users/create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            loadUsers();
            closeModal('addUserModal');
            document.getElementById('userForm').reset();
        }

        document.addEventListener('DOMContentLoaded', loadUsers);
    </script>
</body>
</html>
