<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hospital Management System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
    .page { display: none; }
    .page.active { display: block; }
    .sidebar-link { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-radius: 8px; transition: all 0.2s; cursor: pointer; }
    .sidebar-link:hover { background: #eef2ff; color: #4f46e5; }
    .sidebar-link.active { background: #eef2ff; color: #4f46e5; font-weight: 600; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 50; align-items: flex-start; justify-content: center; padding-top: 60px; }
    .modal-overlay.open { display: flex; }
    .modal { background: white; border-radius: 12px; width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto; padding: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
    .input { width: 100%; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; outline: none; transition: border-color 0.2s; }
    .input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
    .select { width: 100%; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; background: white; }
    .btn-primary { padding: 8px 20px; background: #4f46e5; color: white; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; transition: background 0.2s; }
    .btn-primary:hover { background: #4338ca; }
    .btn-secondary { padding: 8px 20px; background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; cursor: pointer; }
    .btn-secondary:hover { background: #e5e7eb; }
    .btn-danger { padding: 8px 20px; background: #ef4444; color: white; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
    .btn-danger:hover { background: #dc2626; }
    .table-container { overflow-x: auto; background: white; border-radius: 12px; border: 1px solid #e5e7eb; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { text-align: left; padding: 12px 16px; background: #f9fafb; color: #6b7280; font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 0.05em; border-bottom: 1px solid #e5e7eb; }
    td { padding: 12px 16px; border-bottom: 1px solid #f3f4f6; color: #374151; }
    tr:hover td { background: #f9fafb; }
    .card { background: white; border-radius: 12px; border: 1px solid #e5e7eb; padding: 20px; }
    .stat-card { background: white; border-radius: 12px; border: 1px solid #e5e7eb; padding: 20px; display: flex; align-items: center; gap: 16px; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 9999px; font-size: 12px; font-weight: 500; }
    .badge-green { background: #dcfce7; color: #166534; }
    .badge-red { background: #fee2e2; color: #991b1b; }
    .badge-yellow { background: #fef9c3; color: #854d0e; }
    .badge-blue { background: #dbeafe; color: #1e40af; }
    .toast { position: fixed; bottom: 24px; right: 24px; background: #1f2937; color: white; padding: 12px 20px; border-radius: 8px; font-size: 14px; z-index: 100; transform: translateY(100px); opacity: 0; transition: all 0.3s; }
    .toast.show { transform: translateY(0); opacity: 1; }
    @media (max-width: 1023px) { .sidebar { position: fixed; inset: 0; z-index: 40; transform: translateX(-100%); transition: transform 0.3s; } .sidebar.open { transform: translateX(0); } }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

<div id="app">
  <!-- Login Page -->
  <div id="page-login" class="page active">
    <div class="min-h-screen flex items-center justify-center px-4" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
      <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
        <div class="text-center mb-6">
          <div class="text-4xl mb-2">🏥</div>
          <h1 class="text-2xl font-bold text-gray-800">Hospital Management</h1>
          <p class="text-sm text-gray-500 mt-1">Sign in to your account</p>
        </div>
        <form id="loginForm" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input type="email" id="loginEmail" class="input" placeholder="admin@hospital.com" required>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input type="password" id="loginPassword" class="input" placeholder="••••••" required>
          </div>
          <p id="loginError" class="text-red-500 text-sm hidden"></p>
          <button type="submit" class="btn-primary w-full py-3 text-base">Sign In</button>
        </form>
        <p class="text-center text-xs text-gray-400 mt-4">Demo: admin@hospital.com / admin123</p>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div id="page-app" class="page">
    <div class="flex h-screen">
      <!-- Sidebar Overlay -->
      <div id="sidebarOverlay" class="fixed inset-0 bg-black/20 z-30 lg:hidden hidden" onclick="toggleSidebar()"></div>

      <!-- Sidebar -->
      <aside id="sidebar" class="sidebar w-64 bg-white border-r border-gray-200 flex flex-col lg:translate-x-0 lg:static fixed inset-y-0 left-0 z-40 overflow-y-auto">
        <div class="p-4 border-b border-gray-200 flex items-center justify-between">
          <div>
            <h1 class="text-lg font-bold text-indigo-600">🏥 HMS</h1>
            <p class="text-xs text-gray-500">Hospital Management</p>
          </div>
          <button class="lg:hidden p-1 hover:bg-gray-100 rounded" onclick="toggleSidebar()">
            <i class="fas fa-times text-gray-500"></i>
          </button>
        </div>
        <div class="p-3 space-y-1 flex-1">
          <div class="sidebar-link active" onclick="navigate('dashboard')"><i class="fas fa-chart-pie w-5 text-center"></i><span>Dashboard</span></div>
          <div class="sidebar-link" onclick="navigate('patients')"><i class="fas fa-user-injured w-5 text-center"></i><span>Patients</span></div>
          <div class="sidebar-link" onclick="navigate('inventory')"><i class="fas fa-boxes w-5 text-center"></i><span>Inventory</span></div>
          <div class="sidebar-link" onclick="navigate('departments')"><i class="fas fa-building w-5 text-center"></i><span>Departments</span></div>
          <div class="sidebar-link" onclick="navigate('tasks')"><i class="fas fa-tasks w-5 text-center"></i><span>Tasks</span></div>
          <div id="navUsers" class="sidebar-link hidden" onclick="navigate('users')"><i class="fas fa-users w-5 text-center"></i><span>Users</span></div>
        </div>
        <div class="p-3 border-t border-gray-200">
          <div class="flex items-center gap-3 mb-2">
            <div class="w-9 h-9 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 font-semibold" id="userAvatar">A</div>
            <div>
              <p class="text-sm font-medium" id="userName">Admin</p>
              <p class="text-xs text-gray-500" id="userRole">admin</p>
            </div>
          </div>
          <button onclick="logout()" class="btn-secondary w-full text-xs">Logout</button>
        </div>
      </aside>

      <!-- Main Content -->
      <div class="flex-1 flex flex-col min-w-0">
        <header class="bg-white border-b border-gray-200 px-4 py-3 flex items-center gap-3 lg:hidden">
          <button onclick="toggleSidebar()" class="p-2 hover:bg-gray-100 rounded-lg">
            <i class="fas fa-bars text-gray-600"></i>
          </button>
          <h1 class="text-sm font-semibold text-gray-700">🏥 HMS</h1>
        </header>

        <main class="flex-1 overflow-y-auto p-4 lg:p-6">
          <!-- Dashboard -->
          <div id="page-dashboard" class="page active">
            <h2 class="text-xl font-semibold mb-6">Dashboard</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6" id="statsContainer"></div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div class="card"><h3 class="font-semibold mb-3">Recent Patients</h3><div id="recentPatients" class="text-sm text-gray-500"></div></div>
              <div class="card"><h3 class="font-semibold mb-3">Low Stock Items</h3><div id="lowStockItems" class="text-sm text-gray-500"></div></div>
            </div>
          </div>

          <!-- Patients -->
          <div id="page-patients" class="page">
            <div class="flex items-center justify-between mb-4">
              <h2 class="text-xl font-semibold">Patients</h2>
              <button onclick="openModal('patient')" class="btn-primary"><i class="fas fa-plus mr-1"></i> Add Patient</button>
            </div>
            <div class="table-container" id="patientsContainer"></div>
          </div>

          <!-- Inventory -->
          <div id="page-inventory" class="page">
            <div class="flex items-center justify-between mb-4">
              <h2 class="text-xl font-semibold">Inventory</h2>
              <button onclick="openModal('inventory')" class="btn-primary"><i class="fas fa-plus mr-1"></i> Add Item</button>
            </div>
            <div class="table-container" id="inventoryContainer"></div>
          </div>

          <!-- Departments -->
          <div id="page-departments" class="page">
            <div class="flex items-center justify-between mb-4">
              <h2 class="text-xl font-semibold">Departments</h2>
              <button onclick="openModal('department')" class="btn-primary"><i class="fas fa-plus mr-1"></i> Add Department</button>
            </div>
            <div class="table-container" id="departmentsContainer"></div>
          </div>

          <!-- Tasks -->
          <div id="page-tasks" class="page">
            <div class="flex items-center justify-between mb-4">
              <h2 class="text-xl font-semibold">Tasks</h2>
              <button onclick="openModal('task')" class="btn-primary"><i class="fas fa-plus mr-1"></i> Add Task</button>
            </div>
            <div class="table-container" id="tasksContainer"></div>
          </div>

          <!-- Users (Admin only) -->
          <div id="page-users" class="page">
            <div class="flex items-center justify-between mb-4">
              <h2 class="text-xl font-semibold">Users</h2>
              <button onclick="openModal('user')" class="btn-primary"><i class="fas fa-plus mr-1"></i> Add User</button>
            </div>
            <div class="table-container" id="usersContainer"></div>
          </div>
        </main>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div id="modalOverlay" class="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="flex items-center justify-between mb-4">
      <h3 id="modalTitle" class="text-lg font-semibold"></h3>
      <button onclick="closeModal()" class="p-1 hover:bg-gray-100 rounded"><i class="fas fa-times text-gray-400"></i></button>
    </div>
    <form id="modalForm" onsubmit="handleFormSubmit(event)" class="space-y-3">
      <div id="modalBody"></div>
      <div class="flex justify-end gap-3 pt-2">
        <button type="button" onclick="closeModal()" class="btn-secondary">Cancel</button>
        <button type="submit" class="btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script>
// ============ DATA LAYER ============
const DB = {
  get(key) { return JSON.parse(localStorage.getItem('hms_' + key) || 'null'); },
  set(key, val) { localStorage.setItem('hms_' + key, JSON.stringify(val)); },
  seed() {
    if (this.get('_seeded')) return;
    this.set('users', [
      { id: 1, name: 'Admin User', email: 'admin@hospital.com', password: 'admin123', mobile: '9999999999', role: 'admin', designation: 'Administrator', isActive: true },
      { id: 2, name: 'Employee One', email: 'employee@hospital.com', password: 'emp123', mobile: '8888888888', role: 'employee', designation: 'Nurse', isActive: true }
    ]);
    this.set('departments', [
      { id: 1, name: 'Emergency', category: 'Clinical', floor: 'Ground' },
      { id: 2, name: 'Radiology', category: 'Clinical', floor: '1st' },
      { id: 3, name: 'Pharmacy', category: 'Support', floor: 'Ground' }
    ]);
    this.set('patients', [
      { id: 1, name: 'John Doe', age: 45, gender: 'Male', contact: '9876543210', disease: 'Pneumonia', doctor: 'Dr. Smith', room: '101', status: 'Admitted', admitted: '2026-07-10' },
      { id: 2, name: 'Jane Smith', age: 32, gender: 'Female', contact: '8765432109', disease: 'Fracture', doctor: 'Dr. Jones', room: '205', status: 'Admitted', admitted: '2026-07-12' },
      { id: 3, name: 'Bob Wilson', age: 58, gender: 'Male', contact: '7654321098', disease: 'Diabetes', doctor: 'Dr. Smith', room: '310', status: 'Discharged', admitted: '2026-07-05' },
      { id: 4, name: 'Alice Brown', age: 28, gender: 'Female', contact: '6543210987', disease: 'Appendicitis', doctor: 'Dr. Jones', room: '108', status: 'Admitted', admitted: '2026-07-14' }
    ]);
    this.set('inventory', [
      { id: 1, name: 'Paracetamol 500mg', category: 'Medicine', quantity: 500, unit: 'tablets', threshold: 100, price: 2 },
      { id: 2, name: 'Syringes 5ml', category: 'Equipment', quantity: 200, unit: 'pieces', threshold: 50, price: 5 },
      { id: 3, name: 'Bandages', category: 'Supplies', quantity: 300, unit: 'rolls', threshold: 100, price: 15 },
      { id: 4, name: 'Amoxicillin 250mg', category: 'Medicine', quantity: 80, unit: 'capsules', threshold: 100, price: 8 },
      { id: 5, name: 'Gloves (Box)', category: 'Supplies', quantity: 45, unit: 'boxes', threshold: 30, price: 120 }
    ]);
    this.set('tasks', [
      { id: 1, title: 'Clean Emergency Room', description: 'Deep clean ER area', assignedTo: 'Employee One', priority: 'High', status: 'Pending', dueDate: '2026-07-16' },
      { id: 2, title: 'Restock Pharmacy', description: 'Reorder low medicines', assignedTo: 'Employee One', priority: 'Medium', status: 'In Progress', dueDate: '2026-07-18' },
      { id: 3, title: 'Patient Round', description: 'Morning check on all patients', assignedTo: 'Employee One', priority: 'High', status: 'Completed', dueDate: '2026-07-15' }
    ]);
    this.set('_seeded', true);
  }
};

DB.seed();

// ============ STATE ============
let currentUser = null;
let editingId = null;
let modalType = '';

// ============ AUTH ============
document.getElementById('loginForm').onsubmit = function(e) {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const users = DB.get('users') || [];
  const user = users.find(u => u.email === email && u.password === password && u.isActive);
  if (!user) {
    const err = document.getElementById('loginError');
    err.textContent = 'Invalid email or password';
    err.classList.remove('hidden');
    return;
  }
  currentUser = user;
  document.getElementById('loginEmail').value = '';
  document.getElementById('loginPassword').value = '';
  document.getElementById('loginError').classList.add('hidden');
  enterApp();
};

function logout() {
  currentUser = null;
  document.getElementById('page-app').classList.remove('active');
  document.getElementById('page-login').classList.add('active');
}

function enterApp() {
  document.getElementById('page-login').classList.remove('active');
  document.getElementById('page-app').classList.add('active');
  const avatar = document.getElementById('userAvatar');
  avatar.textContent = currentUser.name.charAt(0).toUpperCase();
  document.getElementById('userName').textContent = currentUser.name;
  document.getElementById('userRole').textContent = currentUser.role.toUpperCase();
  const navUsers = document.getElementById('navUsers');
  if (currentUser.role === 'admin') navUsers.classList.remove('hidden'); else navUsers.classList.add('hidden');
  navigate('dashboard');
}

// ============ NAVIGATION ============
function navigate(page) {
  document.querySelectorAll('.page[id^="page-"]').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
  document.querySelectorAll('.sidebar-link').forEach(l => {
    if (l.textContent.trim().toLowerCase().includes(page === 'dashboard' ? 'dashboard' : page)) l.classList.add('active');
  });
  if (window.innerWidth < 1024) { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.add('hidden'); }
  renderPage(page);
}

function toggleSidebar() {
  const s = document.getElementById('sidebar');
  const o = document.getElementById('sidebarOverlay');
  s.classList.toggle('open'); o.classList.toggle('hidden');
}

// ============ RENDER ============
function renderPage(page) {
  switch(page) {
    case 'dashboard': renderDashboard(); break;
    case 'patients': renderTable('patients', ['Name','Age','Gender','Disease','Doctor','Room','Status','Admitted','Actions']); break;
    case 'inventory': renderTable('inventory', ['Name','Category','Quantity','Unit','Threshold','Price','Actions']); break;
    case 'departments': renderTable('departments', ['Name','Category','Floor','Actions']); break;
    case 'tasks': renderTable('tasks', ['Title','Assigned To','Priority','Status','Due Date','Actions']); break;
    case 'users': renderTable('users', ['Name','Email','Role','Designation','Status','Actions']); break;
  }
}

function renderDashboard() {
  const patients = DB.get('patients') || [];
  const inventory = DB.get('inventory') || [];
  const tasks = DB.get('tasks') || [];
  const departments = DB.get('departments') || [];
  document.getElementById('statsContainer').innerHTML = `
    <div class="stat-card"><div class="w-12 h-12 rounded-lg bg-blue-100 flex items-center justify-center text-blue-600 text-xl"><i class="fas fa-user-injured"></i></div><div><p class="text-2xl font-bold">${patients.length}</p><p class="text-sm text-gray-500">Total Patients</p></div></div>
    <div class="stat-card"><div class="w-12 h-12 rounded-lg bg-green-100 flex items-center justify-center text-green-600 text-xl"><i class="fas fa-boxes"></i></div><div><p class="text-2xl font-bold">${inventory.length}</p><p class="text-sm text-gray-500">Inventory Items</p></div></div>
    <div class="stat-card"><div class="w-12 h-12 rounded-lg bg-yellow-100 flex items-center justify-center text-yellow-600 text-xl"><i class="fas fa-tasks"></i></div><div><p class="text-2xl font-bold">${tasks.length}</p><p class="text-sm text-gray-500">Total Tasks</p></div></div>
    <div class="stat-card"><div class="w-12 h-12 rounded-lg bg-purple-100 flex items-center justify-center text-purple-600 text-xl"><i class="fas fa-building"></i></div><div><p class="text-2xl font-bold">${departments.length}</p><p class="text-sm text-gray-500">Departments</p></div></div>
  `;
  const recent = patients.slice(-3).reverse();
  document.getElementById('recentPatients').innerHTML = recent.length
    ? recent.map(p => `<div class="flex justify-between py-2 border-b border-gray-100 last:border-0"><span>${p.name}</span><span class="badge ${p.status === 'Admitted' ? 'badge-green' : 'badge-blue'}">${p.status}</span></div>`).join('')
    : '<p>No patients</p>';
  const lowStock = inventory.filter(i => i.quantity <= i.threshold);
  document.getElementById('lowStockItems').innerHTML = lowStock.length
    ? lowStock.map(i => `<div class="flex justify-between py-2 border-b border-gray-100 last:border-0"><span>${i.name}</span><span class="text-red-500 font-medium">${i.quantity} ${i.unit}</span></div>`).join('')
    : '<p>All items are well stocked</p>';
}

function renderTable(type, headers) {
  const data = DB.get(type) || [];
  const container = document.getElementById(type + 'Container');
  if (!data.length) { container.innerHTML = '<div class="p-8 text-center text-gray-400">No ' + type + ' found</div>'; return; }
  container.innerHTML = '<table><thead><tr>' + headers.map(h => '<th>' + h + '</th>').join('') + '</tr></thead><tbody>' + data.map(item => '<tr>' + getRowData(type, item) + '</tr>').join('') + '</tbody></table>';
}

function getRowData(type, item) {
  switch(type) {
    case 'patients': {
      const statusBadge = item.status === 'Admitted' ? 'badge-green' : 'badge-blue';
      return `<td>${item.name}</td><td>${item.age}</td><td>${item.gender}</td><td>${item.disease}</td><td>${item.doctor}</td><td>${item.room}</td><td><span class="badge ${statusBadge}">${item.status}</span></td><td class="text-sm text-gray-500">${item.admitted}</td><td><button onclick="editItem('patients',${item.id})" class="text-indigo-600 hover:text-indigo-800 mr-2"><i class="fas fa-edit"></i></button><button onclick="deleteItem('patients',${item.id})" class="text-red-500 hover:text-red-700"><i class="fas fa-trash"></i></button></td>`;
    }
    case 'inventory': {
      const low = item.quantity <= item.threshold;
      return `<td>${item.name}</td><td>${item.category}</td><td class="${low ? 'text-red-500 font-bold' : ''}">${item.quantity}</td><td>${item.unit}</td><td>${item.threshold}</td><td>$${item.price}</td><td><button onclick="editItem('inventory',${item.id})" class="text-indigo-600 hover:text-indigo-800 mr-2"><i class="fas fa-edit"></i></button><button onclick="deleteItem('inventory',${item.id})" class="text-red-500 hover:text-red-700"><i class="fas fa-trash"></i></button></td>`;
    }
    case 'departments':
      return `<td>${item.name}</td><td>${item.category}</td><td>${item.floor}</td><td><button onclick="editItem('departments',${item.id})" class="text-indigo-600 hover:text-indigo-800 mr-2"><i class="fas fa-edit"></i></button><button onclick="deleteItem('departments',${item.id})" class="text-red-500 hover:text-red-700"><i class="fas fa-trash"></i></button></td>`;
    case 'tasks': {
      const pBadge = item.priority === 'High' ? 'badge-red' : item.priority === 'Medium' ? 'badge-yellow' : 'badge-blue';
      const sBadge = item.status === 'Completed' ? 'badge-green' : item.status === 'In Progress' ? 'badge-yellow' : 'badge-red';
      return `<td>${item.title}</td><td>${item.assignedTo}</td><td><span class="badge ${pBadge}">${item.priority}</span></td><td><span class="badge ${sBadge}">${item.status}</span></td><td>${item.dueDate}</td><td><button onclick="editItem('tasks',${item.id})" class="text-indigo-600 hover:text-indigo-800 mr-2"><i class="fas fa-edit"></i></button><button onclick="deleteItem('tasks',${item.id})" class="text-red-500 hover:text-red-700"><i class="fas fa-trash"></i></button></td>`;
    }
    case 'users': {
      const activeBadge = item.isActive ? 'badge-green' : 'badge-red';
      return `<td>${item.name}</td><td>${item.email}</td><td><span class="badge badge-blue">${item.role}</span></td><td>${item.designation}</td><td><span class="badge ${activeBadge}">${item.isActive ? 'Active' : 'Inactive'}</span></td><td><button onclick="editItem('users',${item.id})" class="text-indigo-600 hover:text-indigo-800 mr-2"><i class="fas fa-edit"></i></button><button onclick="deleteItem('users',${item.id})" class="text-red-500 hover:text-red-700"><i class="fas fa-trash"></i></button></td>`;
    }
  }
}

// ============ CRUD ============
function openModal(type) {
  modalType = type; editingId = null;
  document.getElementById('modalTitle').textContent = 'Add ' + type.charAt(0).toUpperCase() + type.slice(1);
  const body = document.getElementById('modalBody');
  const users = DB.get('users') || [];
  const departments = DB.get('departments') || [];
  const templates = {
    patient: `
      <div class="grid grid-cols-2 gap-3"><div><label class="block text-sm font-medium mb-1">Name</label><input class="input" id="f-name" required></div>
      <div><label class="block text-sm font-medium mb-1">Age</label><input type="number" class="input" id="f-age" required></div>
      <div><label class="block text-sm font-medium mb-1">Gender</label><select class="select" id="f-gender"><option>Male</option><option>Female</option><option>Other</option></select></div>
      <div><label class="block text-sm font-medium mb-1">Contact</label><input class="input" id="f-contact"></div>
      <div><label class="block text-sm font-medium mb-1">Disease</label><input class="input" id="f-disease"></div>
      <div><label class="block text-sm font-medium mb-1">Doctor</label><input class="input" id="f-doctor"></div>
      <div><label class="block text-sm font-medium mb-1">Room</label><input class="input" id="f-room"></div>
      <div><label class="block text-sm font-medium mb-1">Status</label><select class="select" id="f-status"><option>Admitted</option><option>Discharged</option></select></div></div>
      <div><label class="block text-sm font-medium mb-1">Admitted Date</label><input type="date" class="input" id="f-admitted"></div>`,
    inventory: `
      <div class="grid grid-cols-2 gap-3"><div><label class="block text-sm font-medium mb-1">Name</label><input class="input" id="f-name" required></div>
      <div><label class="block text-sm font-medium mb-1">Category</label><select class="select" id="f-category"><option>Medicine</option><option>Equipment</option><option>Supplies</option></select></div>
      <div><label class="block text-sm font-medium mb-1">Quantity</label><input type="number" class="input" id="f-quantity" required></div>
      <div><label class="block text-sm font-medium mb-1">Unit</label><input class="input" id="f-unit" placeholder="tablets, boxes, etc."></div>
      <div><label class="block text-sm font-medium mb-1">Threshold</label><input type="number" class="input" id="f-threshold" value="50"></div>
      <div><label class="block text-sm font-medium mb-1">Price ($)</label><input type="number" step="0.01" class="input" id="f-price"></div></div>`,
    department: `
      <div><label class="block text-sm font-medium mb-1">Name</label><input class="input" id="f-name" required></div>
      <div><label class="block text-sm font-medium mb-1">Category</label><select class="select" id="f-category"><option>Clinical</option><option>Support</option><option>Administrative</option></select></div>
      <div><label class="block text-sm font-medium mb-1">Floor</label><input class="input" id="f-floor" placeholder="Ground, 1st, etc."></div>`,
    task: `
      <div><label class="block text-sm font-medium mb-1">Title</label><input class="input" id="f-title" required></div>
      <div><label class="block text-sm font-medium mb-1">Description</label><textarea class="input" id="f-description" rows="2"></textarea></div>
      <div class="grid grid-cols-2 gap-3"><div><label class="block text-sm font-medium mb-1">Assign To</label><select class="select" id="f-assignedTo">${users.filter(u=>u.isActive).map(u => '<option>' + u.name + '</option>').join('')}</select></div>
      <div><label class="block text-sm font-medium mb-1">Priority</label><select class="select" id="f-priority"><option>Low</option><option selected>Medium</option><option>High</option></select></div>
      <div><label class="block text-sm font-medium mb-1">Status</label><select class="select" id="f-status"><option>Pending</option><option>In Progress</option><option>Completed</option></select></div>
      <div><label class="block text-sm font-medium mb-1">Due Date</label><input type="date" class="input" id="f-dueDate"></div></div>`,
    user: `
      <div class="grid grid-cols-2 gap-3"><div><label class="block text-sm font-medium mb-1">Name</label><input class="input" id="f-name" required></div>
      <div><label class="block text-sm font-medium mb-1">Email</label><input type="email" class="input" id="f-email" required></div>
      <div><label class="block text-sm font-medium mb-1">Password</label><input type="password" class="input" id="f-password" required></div>
      <div><label class="block text-sm font-medium mb-1">Mobile</label><input class="input" id="f-mobile"></div>
      <div><label class="block text-sm font-medium mb-1">Role</label><select class="select" id="f-role"><option>employee</option><option>admin</option></select></div>
      <div><label class="block text-sm font-medium mb-1">Department</label><select class="select" id="f-department"><option></option>${departments.map(d => '<option>' + d.name + '</option>').join('')}</select></div>
      <div><label class="block text-sm font-medium mb-1">Designation</label><input class="input" id="f-designation"></div></div>`
  };
  body.innerHTML = templates[type];
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); editingId = null; }

function handleFormSubmit(e) {
  e.preventDefault();
  const data = {};
  document.querySelectorAll('#modalBody input, #modalBody select, #modalBody textarea').forEach(el => {
    const key = el.id.replace('f-', '');
    if (el.type === 'number') data[key] = parseFloat(el.value) || 0;
    else data[key] = el.value;
  });
  let items = DB.get(modalType) || [];
  if (editingId) {
    const idx = items.findIndex(i => i.id === editingId);
    if (idx > -1) items[idx] = { ...items[idx], ...data };
  } else {
    data.id = Date.now();
    if (modalType === 'patients') data.admitted = data.admitted || new Date().toISOString().slice(0,10);
    items.push(data);
  }
  DB.set(modalType, items);
  closeModal();
  renderPage(modalType);
  showToast(editingId ? 'Updated successfully' : 'Added successfully');
}

function editItem(type, id) {
  const items = DB.get(type) || [];
  const item = items.find(i => i.id === id);
  if (!item) return;
  editingId = id; modalType = type;
  document.getElementById('modalTitle').textContent = 'Edit ' + type.charAt(0).toUpperCase() + type.slice(1);
  openModal(type);
  setTimeout(() => {
    Object.entries(item).forEach(([k, v]) => {
      const el = document.getElementById('f-' + k);
      if (el) { if (el.type === 'number') el.value = v; else el.value = v || ''; }
    });
    const pwd = document.getElementById('f-password');
    if (pwd && type === 'user') pwd.required = false;
  }, 50);
}

function deleteItem(type, id) {
  if (!confirm('Delete this ' + type.slice(0, -1) + '?')) return;
  let items = DB.get(type) || [];
  items = items.filter(i => i.id !== id);
  DB.set(type, items);
  renderPage(type);
  showToast('Deleted successfully');
}

// ============ TOAST ============
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ============ SEED CHECK ============
if (window.location.hash) {
  const hash = window.location.hash.replace('#', '');
  if (hash === 'login') { /* default */ }
}
</script>
</body>
